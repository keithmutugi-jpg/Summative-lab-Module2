<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wordly Dictionary SPA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1> Wordly Dictionary</h1>

        <!-- Search Form -->
        <form id="searchForm">
            <input type="text" id="searchInput" placeholder="Enter a word..." required>
            <button type="submit">Search</button>
        </form>

        <!-- Error Message -->
        <p id="error"></p>

        <!-- Results -->
        <div id="result"></div>

        <!-- Favorites -->
        <h2> Favorites</h2>
        <ul id="favorites"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
